name: "Publish message-converter library"
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  build:
    name: "build-and-publish"
    runs-on: "ubuntu-24.04"
    permissions:
      packages: write
      repository-projects: write
      contents: write
    steps:
      - uses: "actions/checkout@v7"
      - uses: "actions/setup-java@v5"
        with:
          "java-version": "21"
          "distribution": "temurin"
      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: "Build and tests message-converter"
        run: ./gradlew :test :build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: x-access-token

      - name: "Show message-converter version"
        run: |
          VERSION=$(grep 'version =' build.gradle.kts | awk -F'"' '{print $2}')
          echo "Publishing message-converter version: $VERSION"
      - name: "Publish message-converter to GitHub Packages"
        run: ./gradlew --stacktrace :publish
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: x-access-token